Singleton Pattern Example in C#
Objective
Implement the Singleton Design Pattern to ensure that only one instance of the Logger class exists throughout the application lifecycle.
Files
•	Program.cs
•	Logger.cs
Design Pattern Used
Singleton Pattern
Explanation
The Logger class follows the Singleton Design Pattern by:
•	Having a private constructor.
•	Maintaining a private static instance.
•	Providing a public static GetInstance() method.
•	Ensuring only one object is created.
Expected Output
Logger Instance Created LOG: First Message LOG: Second Message
Only one Logger instance exists.
